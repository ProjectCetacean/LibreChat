version: 1.3.9
cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["deepseek/deepseek-chat-v3.1", "deepseek/deepseek-v3.2-exp"]
        fetch: true
      titleConvo: true
      titleModel: "deepseek/deepseek-chat-v3.1"
      modelDisplayLabel: "OpenRouter"
      systemMessage: |
        On the first user message of a conversation, call list_skills on the skills MCP to discover available skill guidance. If a returned skill's description matches the task, call get_skill on it before proceeding. Do not summarize tools from prior training; rely on live discovery only.

mcpServers:
  open-brain:
    type: streamable-http
    url: https://cuvtcxtvxnthkkxxlrbb.supabase.co/functions/v1/open-brain-mcp
    headers:
      x-brain-key: "${OPEN_BRAIN_KEY}"
    timeout: 60000
    initTimeout: 30000

  google-workspace:
    type: streamable-http
    url: https://cuvtcxtvxnthkkxxlrbb.supabase.co/functions/v1/google-workspace
    headers:
      x-workspace-key: "${WORKSPACE_MCP_KEY}"
    timeout: 60000
    initTimeout: 30000

  storygraph:
    type: streamable-http
    url: https://storygraph-mcp-blorbit.fly.dev/mcp
    timeout: 60000
    initTimeout: 30000

  skills:
    type: streamable-http
    url: https://skills-mcp-blorbit.fly.dev/mcp
    headers:
      x-skills-key: "${SKILLS_MCP_KEY}"
    timeout: 60000
    initTimeout: 30000
webSearch:
  searchProvider: "tavily"
  scraperProvider: "tavily"
  rerankerType: "none"
  tavilyApiKey: "${TAVILY_API_KEY}"
  safeSearch: 0
